server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Defense in depth: even though the build strips src/pages/internal,
    # hard-block the private business strategy path on this deploy.
    location ^~ /internal/ { return 404; }

    # Astro static output uses directory index.html (clean URLs).
    location / {
        try_files $uri $uri/ =404;
    }

    # Light caching for hashed assets.
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
